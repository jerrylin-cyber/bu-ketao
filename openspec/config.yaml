schema: spec-driven

context: |
  專案類型：繁體中文 LLM 輸出壓縮規則集（純文字規則，無程式碼）
  格式：Markdown 規則檔（Claude Code skill / system prompt / Cursor rules）
  目標：減少中文 LLM 回應中的冗餘文字，保留技術準確度
  現有內容：10 類文字冗餘分類 + 3 類行為冗餘 + 3 個壓縮等級 + 10 組 before/after 實測

rules:
  design:
    - 簡潔
    - 規則必須可驗證（能用測試集量化效果）
  proposal:
    - 聚焦壓縮效果與使用者體驗
  specs:
    - 使用 Given/When/Then
  tasks:
    - 15 分鐘完成
